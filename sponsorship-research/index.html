<!-- APEX access gate (soft, client-side) -->
<style>
  html.apexlock body>*:not(#apex-gate){display:none!important}
  html.apexlock{overflow:hidden}
  #apex-gate{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#084d2a 0%,#0b6b3a 55%,#12894b 100%);
    font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif}
  #apex-gate .gbox{width:min(92vw,360px);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);
    border-radius:18px;padding:34px 30px 28px;box-shadow:0 24px 60px rgba(0,0,0,.32);backdrop-filter:blur(8px);
    text-align:center;color:#eafaf0}
  #apex-gate .gicon{width:54px;height:54px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;
    justify-content:center;font-size:26px;background:#e7b53c;color:#3a2c00;font-weight:800;box-shadow:0 6px 16px rgba(0,0,0,.25)}
  #apex-gate h2{margin:0 0 4px;font-size:21px;font-weight:800;letter-spacing:.5px;color:#fff}
  #apex-gate p{margin:0 0 20px;font-size:13px;color:#bfe6ce}
  #apex-gate input{width:100%;padding:13px 15px;border-radius:10px;border:1px solid rgba(255,255,255,.25);
    background:rgba(0,0,0,.18);color:#fff;font-size:18px;text-align:center;letter-spacing:6px;outline:none;
    transition:border-color .15s}
  #apex-gate input:focus{border-color:#e7b53c}
  #apex-gate button{width:100%;margin-top:12px;padding:12px;border:none;border-radius:10px;cursor:pointer;
    background:#e7b53c;color:#3a2c00;font-size:15px;font-weight:800;letter-spacing:1px;transition:filter .15s}
  #apex-gate button:hover{filter:brightness(1.06)}
  #apex-gate .ge{display:none;margin-top:12px;font-size:12.5px;color:#ffd7d2}
  #apex-gate.bad .gbox{animation:apexshake .42s}
  @keyframes apexshake{10%,90%{transform:translateX(-2px)}30%,70%{transform:translateX(5px)}50%{transform:translateX(-7px)}}
</style>
<script>
(function(){
  var KEY='apex_gate_v1', HASH=193354864;
  function hf(s){var x=5381;for(var i=0;i<s.length;i++){x=(((x*33)&0xffffffff)^s.charCodeAt(i))>>>0;}return x;}
  function ok(){try{return sessionStorage.getItem(KEY)==='1';}catch(e){return false;}}
  if(ok())return;
  var H=document.documentElement; H.classList.add('apexlock');
  function build(){
    if(document.getElementById('apex-gate'))return;
    var o=document.createElement('div'); o.id='apex-gate';
    o.innerHTML='<div class="gbox"><div class="gicon">&#9899;</div>'+
      '<h2>APEX 研究中心</h2><p>請輸入通行密碼以檢視內容</p>'+
      '<input type="password" inputmode="numeric" autocomplete="off" aria-label="password" placeholder="•••">'+
      '<button type="button">進入</button>'+
      '<div class="ge">密碼錯誤，請再試一次</div></div>';
    (document.body||H).appendChild(o);
    var inp=o.querySelector('input'), btn=o.querySelector('button'), err=o.querySelector('.ge');
    function submit(){
      if(hf((inp.value||'').trim())===HASH){
        try{sessionStorage.setItem(KEY,'1');}catch(e){}
        o.parentNode&&o.parentNode.removeChild(o); H.classList.remove('apexlock');
      }else{
        o.classList.add('bad'); err.style.display='block'; inp.value=''; inp.focus();
        setTimeout(function(){o.classList.remove('bad');},460);
      }
    }
    btn.addEventListener('click',submit);
    inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();submit();}});
    setTimeout(function(){inp.focus();},30);
  }
  if(document.body){build();}
  else{document.addEventListener('DOMContentLoaded',build);
    // also try ASAP so the overlay paints before body content
    var t=setInterval(function(){if(document.body){clearInterval(t);build();}},8);}
})();
</script>

# APEX 贊助與商業合作研究 · 總覽

> 本研究線回答：**既然「贊助商」是 APEX 的第一付費者，那要賣給他們什麼、怎麼定價、怎麼證明有效？**
>
> 這不是「找人塞 logo」，而是把 APEX 賽事與 Player Passport 設計成一套**可量化、可分級、可續約的贊助產品**。

---

## 0. 核心立場：贊助是 APEX 的第一條真實營收

先前商業研究（`/business-research/`）已確立：APEX 第一付費者是**贊助商與投資人**，不是玩家或球館。

因此贊助不是「賽事辦完後順便拉的補助」，而是 **APEX 第一個要做好的產品**。

> **一句話**：APEX 賣給贊助商的，是「一群有消費力的撞球玩家的**注意力**與**數據關係**」，
> 而賽事、明星、直播、Player Passport 都是**生產與計量這份注意力的載體**。

---

## 1. 贊助商買的到底是什麼（四種價值）

| 價值 | 贊助商要的 | APEX 用什麼交付 |
|------|-----------|----------------|
| **觸及（Reach）** | 多少人看到品牌 | 現場觀眾 + 直播/短影音 + 社群 + Passport 頁面曝光 |
| **關聯（Association）** | 跟「競技、專業、明星」綁定 | 認證賽事的專業形象、明星選手、評分公信力 |
| **觸動（Activation）** | 跟潛在客戶實際互動 | 現場體驗、挑戰賽、抽獎、試用、會員導流 |
| **數據（Data）** | 知道觸及了誰、轉化了誰 | Passport 玩家輪廓、報名數據、掃碼/導流可量測 |

> **APEX 的差異化＝第 4 項「數據」。** 傳統撞球贊助只能給前三項（曝光），
> APEX 因為有 Player Passport 與賽事資料，能把贊助從「曝光」升級為「**可量化的玩家關係**」——這是定價與續約的關鍵。

---

## 2. 本線文件索引

| 編號 | 文件 | 回答的問題 |
|------|------|-----------|
| 01 | 運動贊助原理與決策模型 | 贊助商怎麼想、怎麼決定花錢？ |
| 02 | 撞球贊助生態與標竿 | 撞球/斯諾克/中式八球現在誰在贊助、贊助什麼？ |
| 03 | APEX 贊助產品與分級 | APEX 具體賣什麼套餐、怎麼定價？ |
| 04 | 成效衡量與贊助商 ROI | 怎麼證明有效、怎麼讓贊助商續約？ |

---

## 3. 誠實聲明

- 所有**贊助金額、觸及數、轉換率、套餐定價**標 🔧，為初始估計或情境假設，須以實際提案、報價、賽事數據校準。
- 「撞球贊助藍海／無人做」一律降語氣為「公開資料未見成熟做法／值得驗證」。
- 標竿案例（Matchroom、Joy、博彩贊助等）附來源或標 🔧 為產業觀察。
- 博彩、酒精、未成年相關贊助一律標註**合規前置**，不得當作無條件可售。

# 01 · 運動贊助原理與決策模型

> 目標：理解贊助商的腦袋——他們為什麼花錢、怎麼決定、怎麼判斷成敗。
> 不懂這個，APEX 的贊助提案就只是「求贊助」，而不是「賣產品」。

---

## 0. 把「拉贊助」改成「賣產品」

多數小型賽事用「請支持我們」的乞討心態拉贊助，結果只能拿到一次性、小額、無續約的「人情錢」。

APEX 要做的相反：**把贊助當成一個有規格、有定價、有成效報告、有續約邏輯的 B2B 產品。**

---

## 1. 贊助商的三種動機（B2C vs B2B vs 公益/政府）

| 贊助商類型 | 真正想要的 | 對 APEX 的意涵 |
|-----------|-----------|--------------|
| **B2C 品牌**（器材、飲料、3C、運動、博彩*） | 觸及目標客群、品牌關聯、銷售轉化 | 要可量化觸及 + 客群輪廓 + 導流 |
| **B2B / 在地商家**（球館、餐飲、在地服務） | 在地曝光、來客、會員 | 要現場活化 + 在地導流 |
| **政府 / 觀光 / 公益** | 城市行銷、運動推廣、政績/ESG | 要人流、話題、正面形象、報告 |

> \* 博彩/酒精類需**合規前置**（見 README 與 `/tournament-research/05` 反賭規定）。

---

## 2. 贊助的層級（Sponsorship Tiers 的通用結構）

運動贊助通常分層，APEX 應沿用這套通用語言（細化於 `03`）：

```
冠名 / Title（賽事名稱含品牌）         ← 最貴、最獨家
呈現 / Presenting（「由 X 呈現」）
官方夥伴 / Official Partner（分類目獨家：官方球桿/官方飲料…）
贊助商 / Sponsor（一般曝光位）
供應商 / Supplier（提供物資換曝光）
媒體 / 在地夥伴（資源置換）
```

---

## 3. 贊助商的決策漏斗（怎麼從「沒聽過」到「簽約續約」）

```
認知   ：知道有 APEX 這個賽事/平台
評估   ：受眾對不對？觸及夠不夠？形象match？數據可信？
試水   ：先贊一場/一季小額，看成效
擴大   ：成效可量化 → 升級套餐 / 年約 / 冠名
鎖定   ：變成「官方夥伴」，多年約 + 獨家品類
```

> **APEX 的業務設計**：用**一場可展示的旗艦賽**把贊助商從「評估」推到「試水」，
> 再用**成效報告**（`04`）把他從「試水」推到「擴大/鎖定」。

---

## 4. 贊助商最常問的五個問題（提案必須先答）

1. **你的觀眾是誰？** → 玩家輪廓、年齡、消費力、地域（Passport 數據是答案）。
2. **多少人會看到我？** → 現場 + 直播 + 短影音 + 社群 + Passport 曝光的觸及估算。
3. **跟我的品牌 match 嗎？** → 競技/專業/在地/年輕，APEX 的形象定位。
4. **我怎麼知道有效？** → 成效衡量框架（`04`）：曝光、互動、導流、轉化。
5. **多少錢、能客製嗎？** → 分級套餐 + 可組合（`03`）。

> 一份好的 APEX 贊助提案 = 先把這五題答完，再談價格。

---

## 5. 贊助 vs 廣告：APEX 要強調的差異

| | 廣告 | 贊助（APEX 主打） |
|---|------|------------------|
| 關係 | 單向曝光 | 與賽事/社群/玩家**綁定** |
| 信任 | 被略過 | 借賽事與選手的公信力 |
| 數據 | 多為曝光數 | APEX 可給**玩家層級的關係與導流** |
| 續約 | 檔期結束即止 | 成效可累積 → 年約/冠名 |

> APEX 的賣點：**「這不是買廣告版位，這是跟一群撞球玩家建立可量化的關係。」**

---

## 6. 本篇結論

1. 把「拉贊助」徹底改成「賣一個有規格、有定價、有報告、有續約的 B2B 產品」。
2. 分清三種贊助商動機（B2C/B2B/政府），各有不同交付重點。
3. 沿用通用贊助層級語言（冠名→呈現→官方夥伴→贊助→供應商→媒體）。
4. 提案前先答完贊助商五大問題，再談價。
5. APEX 對廣告的差異化＝**綁定 + 公信力 + 可量化的玩家關係**。

> 下一篇 `02`：看撞球世界現在誰在贊助、贊助什麼，找出 APEX 的切入縫隙。

# 02 · 撞球贊助生態與標竿

> 目標：盤點撞球世界現在「誰在贊助、贊助什麼、用什麼模式」，找出 APEX 的切入縫隙。
> 標竿附來源或標 🔧 為產業觀察。

---

## 1. 撞球贊助的既有金主類型

| 金主類型 | 代表 | 贊助什麼 | APEX 可借鏡 |
|---------|------|---------|------------|
| **器材商（球桿/球桌/布/巧克）** | 喬氏 Joy、各球桿品牌 | 自辦或冠名賽事、選手代言 | 最天然的金主，且有「器材商即聯盟」前例 |
| **博彩/投注**（合規地區） | 斯諾克的博彩贊助 | 賽事冠名、轉播廣告 | 高價但**合規與形象風險高** |
| **酒水/飲料/能量飲** | 啤酒、能量飲品牌 | 賽事、現場、酒吧通路 | 與球館場景天然契合 |
| **3C/科技/汽車** | 視市場 | 冠名、形象關聯 | 追求「精準專注」形象關聯 |
| **地方政府/觀光** | 城市賽事 | 場地、補助、城市行銷 | 在地旗艦賽的天然夥伴 |
| **媒體/串流平台** | DAZN（Matchroom）等 | 轉播權利金/分潤 | 後期媒體變現對標 |

---

## 2. 標竿模式拆解

### 2.1 Matchroom — 賽事 IP + 轉播權 + 贊助三輪驅動

- Matchroom 把斯諾克、撞球（Mosconi Cup 等）、飛鏢做成節目化賽事 IP，靠**轉播權利金（如 DAZN 約 £740M 拳擊）+ 贊助 + 票務**驅動，2026 年以逾 £1bn 估值售 15% 股權。`[S1]`
- **模式**：先把賽事做成有觀眾的內容，轉播權與贊助才值錢。

> **對 APEX**：先用節目軌（短影音/直播，見 `/tournament-research/04`）把觀眾與內容做出來，贊助與媒體價值才會出現。量級不同，但**順序相同**。

### 2.2 中式八球 / Joy — 器材商自辦 + 巨額獎金 + 群眾報名

- 喬氏（Joy）以器材商身分自辦世界級中式八球賽事、塑造規則、巨額獎金、海量開放報名（見 `/tournament-research/03`）。
- **模式**：器材商用賽事 + 獎金 + 群眾把自己的器材變成標準，賽事本身就是巨型行銷。

> **對 APEX**：器材商是**最天然的冠名/官方夥伴**；APEX 可與球�edges/球桌品牌做「官方器材」獨家品類贊助。

### 2.3 高獎金九球賽（如「獨牙九球」千萬級獎金）

- 社群研究指出 PTT 與 AzBilliards 同時印證**高獎金九球賽（如 Duya $1.5M 級）震撼全球**（見 `/community-research/`）。
- **模式**：超高獎金本身是**對選手與媒體的信號彈**，吸引頂尖選手與關注。

> **對 APEX**：早期辦不起千萬獎金，但可學**「用一個有信號感的旗艦數字/明星陣容」製造關注**，再轉成贊助談判籌碼。

---

## 3. 既有撞球贊助的痛點（＝ APEX 的縫隙）

| 既有痛點 | APEX 的機會 |
|---------|------------|
| 多數在地賽事贊助是**一次性人情錢**、無數據、無續約 | 提供**可量化成效 + 續約套餐** |
| 贊助商**不知道觸及了誰**（只有模糊曝光） | 用 Player Passport 提供**玩家輪廓與導流數據** |
| 贊助**綁單一大賽**，風險高 | 提供**系列賽/賽季套餐**，分散且可累積 |
| 小賽事**無專業提案能力** | APEX 用標準化提案 + 報告，把贊助產品化 |
| 線上線下**數據斷裂** | APEX 用報名/掃碼/Passport 把線下觀眾轉成線上可量測關係 |

> 🔧 **核心假設（待驗證）**：撞球贊助長期停在「曝光 + 人情」階段，**少見有人用玩家數據把贊助產品化**——這是 APEX 的切入縫隙，但需以實際提案與贊助商訪談驗證，不可當已證明。

---

## 4. APEX 早期最可能的金主排序 🔧

> 依「成交可能性 × 金額 × 形象安全」排序，作為業務優先名單：

1. **撞球器材商**（球桿/球桌/布/巧克）——最天然、形象最 match、可做官方器材獨家。
2. **在地球館 / 連鎖**——想要帶客與認證，可做場地 + 現場活化。
3. **酒水/飲料/能量飲**——與球館場景契合，現場活化強。
4. **地方政府/觀光**——旗艦賽的場地與補助來源。
5. **3C/科技/在地品牌**——追求專注/競技形象關聯。
6. **博彩/投注（合規前置）**——高價但**最後再碰**，需法務與品牌把關。

---

## 5. 本篇結論

1. 撞球既有金主以**器材商、博彩、酒水、地方政府**為主；Matchroom 與 Joy 是兩個關鍵模式標竿。
2. Matchroom 教 APEX「先做內容再賣轉播/贊助」；Joy 教 APEX「器材商是最天然金主」；高獎金九球教 APEX「信號彈製造關注」。
3. 既有撞球贊助的最大痛點是**一次性、無數據、無續約**——這正是 APEX 用 Player Passport 數據切入的縫隙（待驗證）。
4. 早期金主優先序：器材商 → 球館 → 酒水飲料 → 政府觀光 → 3C → 博彩（最後且合規前置）。

---

# 03 · APEX 贊助產品與分級

> 目標：把 APEX 能賣的東西，整理成**可報價、可組合、可續約**的贊助產品目錄。
> 所有金額標 🔧，為定價框架而非定價結論——真實價格須以觸及數據、賽事規模與市場報價校準。

---

## 0. 贊助庫存（Inventory）：APEX 到底有哪些「可售位」

把賽事與平台拆成可售的曝光/互動/數據資產：

| 類別 | 可售資產 |
|------|---------|
| **命名權** | 賽事冠名、分組/獎項冠名、賽季冠名 |
| **實體曝光** | 球檯邊/檯布、背板、計分螢幕、賽場 banner、選手服、裁判服、入場儀式 |
| **數位曝光** | 直播浮水印/角標、短影音片頭尾、Player Passport 頁面/分享卡、官網/排行榜、賽果推播 |
| **內容整合** | 「本場由 X 呈現」、精彩球 X 時刻、明星訪談冠名、數據看板冠名 |
| **現場活化** | 攤位、體驗挑戰賽、抽獎、試用、會員掃碼導流 |
| **數據/CRM** | 賽事參與輪廓報告、導流追蹤、聯名會員（合規同意前提下） |
| **官方品類** | 官方球桿/球桌/飲料/服裝（品類獨家） |

> **APEX 獨家庫存 = 數位曝光（Passport 分享卡）+ 數據/CRM。** 這是傳統撞球賽事給不了的，也是定價溢價來源。

---

## 1. 贊助分級套餐（Tier Card）🔧

> 以下為**結構**；金額為占位示意（🔧），實際依賽事觸及與市場定。

| 級別 | 名稱 | 典型權益 | 數量 | 價格帶 🔧 |
|------|------|---------|------|----------|
| **T1** | 冠名 Title | 賽事名稱含品牌 + 全部數位/實體曝光最高位 + 數據報告 + 官方品類獨家 | 1（獨家） | 最高 |
| **T2** | 呈現 Presenting | 「由 X 呈現」+ 主要曝光 + 現場活化 + 數據報告 | 1–2 | 高 |
| **T3** | 官方夥伴 Official Partner | 單一品類獨家（官方球桿/飲料…）+ 中階曝光 | 數個（分品類） | 中 |
| **T4** | 賽事贊助 Sponsor | 標準曝光位組合（檯邊/背板/直播角標） | 多個 | 中低 |
| **T5** | 供應商 Supplier | 提供物資/服務換曝光 | 多個 | 置換為主 |
| **T6** | 在地/媒體夥伴 | 資源置換、互推 | 多個 | 置換 |

### 1.1 兩種購買單位

- **單場（Event）**：適合試水的新贊助商。
- **賽季/系列（Season）**：折扣 + 連續曝光 + 累積數據，**APEX 主推**（鎖定 + 可預測收入）。

---

## 2. Player Passport 作為贊助載體（APEX 的殺手鐧）

傳統賽事贊助在閉幕後就結束；APEX 的 Passport 讓贊助**延續到賽後**：

| Passport 贊助位 | 說明 | 對贊助商價值 |
|----------------|------|------------|
| **成就徽章冠名** | 「X 品牌 最佳進步獎」徽章長駐玩家履歷 | 長期、正面、與玩家成長綁定 |
| **分享卡品牌位** | 玩家把成績分享到社群時帶品牌 | 玩家自發的二次傳播 |
| **賽季排行榜冠名** | 「X 品牌 APEX 賽季榜」 | 持續曝光 + 競技關聯 |
| **里程碑推播** | 玩家升段/破紀錄時的通知帶品牌 | 高情緒時刻的品牌綁定 |
| **數據洞察** | 贊助商獲得（去識別/同意的）玩家參與輪廓 | 真正的「知道觸及了誰」 |

> **這是 APEX 對贊助商的核心差異**：把一次性賽事曝光，變成**綁定玩家身份、可延續、可量化**的長期關係。

---

## 3. 定價方法（怎麼把套餐標上數字）🔧

不要拍腦袋定價。用兩種方法交叉：

### 3.1 由觸及反推（CPM-like）🔧

```
曝光價值 ≈ (現場人次 + 直播觀看 + 短影音觸及 + 社群觸及 + Passport 曝光) × 每千次觸及單價
```

- 每千次觸及單價參考數位廣告/運動贊助行情（🔧 待查在地行情）。
- **數據/CRM 與品類獨家另計溢價**（APEX 獨有，廣告買不到）。

### 3.2 由價值反推（Value-based）🔧

```
對贊助商的價值 ≈ 帶來的潛在客戶數 × 轉化率 × 客單價 × 毛利
```

- 適合能導流到實際銷售的贊助商（器材商、球館、電商）。

> **原則**：對「要曝光」的賣 CPM 邏輯；對「要轉化」的賣 value-based 邏輯。兩者取較能說服該客戶者。

### 3.3 台灣租稅工具：《運動產業發展條例》§26-2（closing 的臨門一腳）✅

台灣企業贊助 APEX 不只是行銷支出，可以是**稅務上划算的捐贈**——這是對台灣客戶提案的標配武器：

- 營利事業透過**運動部專戶**，對「中央主管機關**認可之職業或業餘運動業**」捐贈：申報所得稅時得按捐贈金額 **175%** 自當年度所得額中減除（額度上限 NT$1,000 萬；具關係人身分者僅按 100% 減除）。
- 對「經專案核准之**重點**職業/業餘運動業」及「經公告之**重點運動賽事主辦單位**」捐贈：**全數按 175% 減除、不受 1,000 萬上限**。
- 專戶每年受贈總額以 NT$30 億為限；本優惠施行期間至**民國 120 年（2031）12 月 23 日**——一個明確的政策窗口，APEX 的贊助產品應在窗口內成形。
- 粗算示意 🔧：以營所稅 20% 計，企業捐 100 萬 → 稅上減除 175 萬 → 省稅約 35 萬 → **實際成本約 65 萬**（實際效果依企業稅務狀況而定，提案時請對方會計師確認）。
- **APEX 前置作業**：① 申請成為「認可之業餘運動業」（或以協會實體申請）；② 中期爭取旗艦賽入列「重點運動賽事」公告；③ 提案 deck 報價頁旁固定附本工具與試算表。
- 來源 ✅：全國法規資料庫《運動產業發展條例》第 26-2 條（114-07-23 修正）
  https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=H0120056&flno=26-2 （存取 2026-07）。

---

## 4. 提案包（Sponsorship Deck）標準結構

APEX 每次提案應有一份標準 deck（可客製）：

1. **APEX 是什麼**（賽事 + 評分 + Player Passport 一頁）
2. **你的受眾**（玩家輪廓、地域、消費力）
3. **觸及預估**（現場/直播/短影音/社群/Passport）
4. **可選套餐**（T1–T6 + 單場/賽季）
5. **數據與成效報告長什麼樣**（見 `04`，先給樣板）
6. **案例 / 旗艦賽展示**（用已辦賽事當證據）
7. **報價與下一步**（台灣客戶：附 §26-2 租稅試算，見 `3.3`）

---

## 5. 早期務實做法（沒數據時怎麼賣）

P0 還沒有觸及數據時的 bootstrap 策略：

1. **先辦一場可展示的旗艦賽**，把它當 sales demo（哪怕贊助是成本價/置換）。
2. **用置換換物資**（器材、場地、獎品），降低辦賽現金成本。
3. **首發贊助商給「創始夥伴價」**，換取案例與長約。
4. **承諾數據報告**：即使第一場觸及小，也交出**完整成效報告**，建立「APEX 是會給數據的賽事」的信任。
5. **搭配補助與租稅工具**：運動部/地方政府補助分攤辦賽成本；對台灣企業提案必附 §26-2 的 175% 減除試算（見 `3.3`）——把「人情贊助」升級為「稅務上划算的捐贈」，也給人情贊助商一個對內交代的理由。

> 第一份成效報告的價值，遠大於第一筆贊助金額——它是後續所有提案的信任基礎。

---

## 6. 本篇結論

1. 把賽事與平台拆成**命名/實體/數位/內容/活化/數據/品類**七類可售庫存。
2. 用 **T1–T6 分級 × 單場/賽季** 組成可報價套餐，主推賽季鎖定。
3. **Player Passport 是 APEX 的贊助殺手鐧**——把一次性曝光變成可延續、可量化的玩家關係。
4. 定價用 **CPM 反推 + value-based 反推** 交叉，數據/品類獨家收溢價；台灣客戶一律搭 **§26-2 租稅工具**（175% 減除，施行至 2031）。
5. 早期沒數據時，用**旗艦賽 demo + 置換 + 創始夥伴價 + 必交成效報告 + 補助/租稅工具**啟動。

> 下一篇 `04`：怎麼衡量成效、產出讓贊助商願意續約的報告。

# 04 · 成效衡量與贊助商 ROI

> 目標：解決贊助商的終極問題——**「我怎麼知道這筆錢有效？」**
> 能回答這題，APEX 才能從「一次性人情贊助」升級到「可續約的年約/冠名」。

---

## 0. 為什麼成效衡量是 APEX 的護城河之一

- 傳統撞球賽事**給不出成效數據**，所以贊助永遠停在小額、一次性。
- APEX 因為有**賽事系統 + Player Passport + 數位曝光**，天生能量測——**「會給數據的賽事」本身就是差異化**。
- 成效報告 → 續約 → 年約/冠名 → 可預測收入 → 投資人愛看的複購曲線。

---

## 1. 衡量框架：四層漏斗（Exposure → Engagement → Lead → Conversion）

| 層 | 衡量什麼 | 指標範例 | 取得方式 |
|----|---------|---------|---------|
| **Exposure 曝光** | 多少人看到品牌 | 現場人次、直播觀看、短影音觸及、社群觸及、Passport 曝光次數 | 現場計數、平台後台、APEX 系統 |
| **Engagement 互動** | 多少人有反應 | 攤位互動、挑戰賽參與、QR 掃碼、貼文互動、分享卡分享數 | 現場登記、UTM/QR、社群後台 |
| **Lead 名單** | 多少人留下關係 | 報名/抽獎留資、會員導流、加好友/追蹤 | 同意式表單、聯名會員 |
| **Conversion 轉化** | 多少人變客戶 | 導購碼使用、試用轉購、到店核銷 | 專屬優惠碼、合作追蹤 |

> 越往下越難量但越值錢。APEX 至少要能穩定交付 **Exposure + Engagement**，並對能導流的贊助商盡量做到 **Lead/Conversion**。

---

## 2. APEX 獨有的可量測資產

| 資產 | 能量測什麼 | 對贊助商的意義 |
|------|-----------|--------------|
| **Player Passport** | 參與者輪廓（去識別/同意）、回訪、活躍 | 「我觸及了哪一群玩家」 |
| **報名系統** | 報名數、地域、重複參賽 | 受眾規模與忠誠度 |
| **數位曝光（直播/短影音/分享卡）** | 觀看、觸及、分享、點擊 | 線上觸及可量化 |
| **專屬 QR/優惠碼** | 掃碼、導流、核銷 | 線下→線上→銷售的閉環 |
| **賽季資料** | 跨場累積觸及與成長 | 年約/系列贊助的累積證據 |

> 這些是傳統撞球賽事**沒有**的能力，是 APEX 把贊助「產品化」的基礎。

---

## 3. 贊助成效報告（Sponsor Report）標準樣板

每個贊助商、每場/每季結束後，APEX 交付一份標準報告：

```
1. 賽事概況：場次、賽制、參賽人數、地域
2. 曝光成效：現場人次 / 直播觀看 / 短影音觸及 / 社群觸及 / Passport 曝光
3. 互動成效：攤位互動 / 挑戰賽參與 / QR 掃碼 / 分享卡分享
4. 名單與導流：留資數 / 會員導流 / 導購碼使用（如適用）
5. 受眾輪廓：參與玩家的（去識別）年齡/地域/水平分布
6. 媒體精選：品牌露出的精彩畫面/數據看板截圖
7. 對比與成長：vs 上一場/上一季（系列贊助專屬）
8. 下一步建議：續約/升級套餐建議
```

> 即使第一場數字很小，**完整交出這份報告**就贏過 99% 的在地撞球賽事——它建立「APEX 是會用數據負責的夥伴」的信任。

---

## 4. 把成效翻成贊助商看得懂的 ROI 🔧

| 贊助商目標 | ROI 算法 🔧 | APEX 提供的輸入 |
|-----------|-----------|----------------|
| 品牌曝光 | 等值媒體價值（觸及 × CPM）÷ 贊助額 | 各通路觸及數 |
| 名單獲取 | 留資數 × 每名單價值 ÷ 贊助額 | 留資/導流數 |
| 銷售轉化 | (導流購買 × 毛利) ÷ 贊助額 | 導購碼/核銷數 |
| 形象關聯 | 品牌好感/認知調查前後差 | 賽事前後問卷（可選） |

> **原則**：用贊助商**自己的目標語言**算 ROI，而不是塞給他一堆 APEX 內部指標。

---

## 5. 從「一次性」到「續約」的機制

| 階段 | APEX 動作 | 目的 |
|------|----------|------|
| 賽前 | 約定**成功指標**（KPIs）與報告格式 | 讓贊助商一開始就知道怎麼算成敗 |
| 賽中 | 即時數據（現場/直播）給贊助商看 | 過程透明、建立信任 |
| 賽後 | 交付**成效報告 + 續約/升級建議** | 把成效變成下一筆訂單 |
| 季末 | 賽季累積報告 + 年約提案 | 鎖定長期、可預測收入 |

> **續約率**是 APEX 贊助業務的核心 KPI，也是投資人評估「贊助收入是否可持續」的關鍵。

---

## 6. 數據治理與合規（不能省）

- **同意式蒐集**：任何玩家輪廓/導流數據須在**明確同意**下蒐集與使用（見 `/community-research/` Passport 隱私設計）。
- **去識別化**：給贊助商的受眾輪廓應為**聚合、去識別**，不交付個資。
- **未成年保護**：未成年玩家數據不得用於商業導流。
- **博彩/酒精合規**：相關贊助的成效追蹤與曝光須符合在地法規與選手保護原則。

> 數據是 APEX 的資產也是責任——治理做不好，護城河會變成法律地雷。

---

## 7. 本篇結論

1. 成效衡量用 **Exposure → Engagement → Lead → Conversion** 四層漏斗。
2. APEX 的可量測資產（Passport、報名、數位曝光、QR/碼、賽季資料）是傳統撞球賽事沒有的，是贊助產品化的基礎。
3. 每場/每季交付**標準成效報告**——即使數字小，也是建立信任與續約的關鍵。
4. ROI 一律用**贊助商自己的目標語言**計算。
5. 續約率是贊助業務的核心 KPI；數據治理與合規是不可省的前提。
